<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="同盟 Link">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>同盟 Link</title>

    <style>
        :root {
            --bg-color: #0d0e15; --panel-color: #161925; --sidebar-color: #0f111a;
            --neon-cyan: #00f3ff; --neon-magenta: #ff0077; --text-color: #e0e6ed;
            --discord-gray: #2b2d31; --discord-dark: #1e1f22; --discord-green: #23a559;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; width: 100%; background: var(--bg-color); color: var(--text-color); font-family: sans-serif; overflow: hidden; }
        body { display: flex; align-items: center; justify-content: center; }
        
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s ease; }
        .neon-logo { font-size: 2.5rem; font-weight: bold; color: #fff; text-transform: uppercase; letter-spacing: 4px; text-shadow: 0 0 5px #fff, 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-cyan); animation: flicker 2s infinite alternate; }
        @keyframes flicker { 0%, 100% { text-shadow: 0 0 4px #fff, 0 0 19px var(--neon-cyan), 0 0 40px var(--neon-cyan); } 20%, 24% { text-shadow: none; } }

        .auth-container { background: var(--panel-color); padding: 30px 20px; border-radius: 8px; border: 2px solid var(--neon-magenta); box-shadow: 0 0 15px rgba(255, 0, 119, 0.3); width: 90%; max-width: 340px; text-align: center; z-index: 10; }
        .auth-container h2 { margin-bottom: 20px; color: white; text-shadow: 0 0 8px var(--neon-magenta); }
        .auth-container input, .auth-container select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 4px; border: 1px solid #1f2833; background: #0b0c10; color: white; font-size: 16px; }
        .auth-container input:focus, .auth-container select:focus { border-color: var(--neon-cyan); outline: none; }
        .auth-container button.main-btn { width: 100%; padding: 12px; background: transparent; border: 2px solid var(--neon-cyan); border-radius: 4px; color: var(--neon-cyan); font-weight: bold; cursor: pointer; text-shadow: 0 0 5px var(--neon-cyan); font-size: 16px; margin-bottom: 15px; }
        .auth-container button.main-btn:hover { background-color: var(--neon-cyan); color: #000; box-shadow: 0 0 15px var(--neon-cyan); }
        .auth-container .switch-btn { background: none; color: var(--neon-cyan); font-size: 14px; cursor: pointer; border: none; }
        .password-wrap { position: relative; width: 100%; }
        .password-wrap input { padding-right: 45px; } 
        .toggle-password { position: absolute; right: 10px; top: 10px; background: none; border: none; color: #b9bbbe; cursor: pointer; font-size: 16px; }

        #chat-page { display: none; background-color: var(--bg-color); width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        
        .sidebar { background: var(--sidebar-color); display: flex; flex-direction: column; border-right: 1px solid #222; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .profile-info { display: flex; align-items: center; gap: 10px; overflow: hidden; }
        .my-avatar { font-size: 1.5rem; }
        .my-name { font-weight: bold; color: #fff; font-size: 1.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .settings-btn { background: transparent; border: none; color: #888; cursor: pointer; font-size: 1.2rem; transition: color 0.3s; padding: 5px; }
        .settings-btn:hover { color: var(--neon-cyan); text-shadow: 0 0 5px var(--neon-cyan); }
        
        .sidebar-scroll { flex-grow: 1; overflow-y: auto; padding: 15px 10px; }
        .sidebar-section-title { font-size: 0.75rem; color: #666; text-transform: uppercase; letter-spacing: 1px; margin: 15px 0 5px 5px; }
        .sidebar-item { padding: 10px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 10px; margin-bottom: 4px; color: #aaa; transition: all 0.2s; border: 1px solid transparent; }
        .sidebar-item:hover, .sidebar-item.active { background: rgba(0, 243, 255, 0.1); color: var(--neon-cyan); border: 1px solid rgba(0, 243, 255, 0.3); }
        .sidebar-item.active { text-shadow: 0 0 5px var(--neon-cyan); font-weight: bold; }
        
        .vc-member-list { list-style: none; padding-left: 32px; margin-bottom: 8px; font-size: 0.9rem; color: #888; display: flex; flex-direction: column; gap: 6px; }
        .vc-member-item { display: flex; align-items: center; gap: 8px; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-3px); } to { opacity: 1; transform: translateY(0); } }

        .sidebar-footer { padding: 10px; border-top: 1px solid #222; }
        .logout-btn { width: 100%; padding: 8px; background: transparent; border: 1px solid var(--neon-magenta); color: var(--neon-magenta); border-radius: 4px; cursor: pointer; font-weight: bold; transition: all 0.3s; }
        .logout-btn:hover { background: var(--neon-magenta); color: #fff; box-shadow: 0 0 10px var(--neon-magenta); }

        .chat-main { flex-grow: 1; display: flex; flex-direction: column; background: var(--panel-color); }
        .chat-header { height: 55px; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: var(--sidebar-color); font-weight: bold; color: #fff; font-size: 1.1rem; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .menu-toggle-btn { display: none; background: transparent; border: none; color: var(--neon-cyan); font-size: 1.5rem; cursor: pointer; }
        
        .vc-btn { background: transparent; border: 1px solid var(--neon-cyan); color: var(--neon-cyan); padding: 6px 14px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.85rem; transition: all 0.3s; text-shadow: 0 0 4px var(--neon-cyan); box-shadow: 0 0 4px rgba(0, 243, 255, 0.2); }
        .vc-btn.connected { border-color: var(--neon-magenta); color: var(--neon-magenta); text-shadow: 0 0 4px var(--neon-magenta); box-shadow: 0 0 4px rgba(255, 0, 119, 0.2); }
        
        #messages { list-style-type: none; margin: 0; padding: 20px; overflow-y: auto; flex-grow: 1; display: flex; flex-direction: column; gap: 12px; -webkit-overflow-scrolling: touch; }
        .message-wrapper { display: flex; flex-direction: column; max-width: 75%; }
        .message-wrapper.self { align-self: flex-end; align-items: flex-end; }
        .message-wrapper.self .msg-content { background-color: rgba(255, 0, 119, 0.1); border: 1px solid var(--neon-magenta); color: #fff; box-shadow: 0 0 8px rgba(255, 0, 119, 0.15); border-bottom-right-radius: 2px; }
        .message-wrapper.other { align-self: flex-start; align-items: flex-start; }
        .message-wrapper.other .msg-content { background-color: rgba(0, 243, 255, 0.1); border: 1px solid var(--neon-cyan); color: #fff; box-shadow: 0 0 8px rgba(0, 243, 255, 0.15); border-bottom-left-radius: 2px; }
        .user-name { font-size: 0.8rem; color: #888; margin-bottom: 2px; padding: 0 4px; font-weight: bold; }
        .msg-content { padding: 10px 14px; border-radius: 14px; font-size: 0.95rem; word-break: break-all; line-height: 1.4; }
        .timestamp { font-size: 0.7rem; color: #555; margin-top: 3px; padding: 0 4px; }

        #form { background: #11131c; padding: 15px; display: flex; border-top: 1px solid #222; align-items: center; gap: 10px; width: 100%; }
        #input { border: none; padding: 12px; background: #0b0c10; color: white; border: 1px solid #1f2833; font-size: 16px; flex-grow: 1; border-radius: 8px; }
        #input:focus { outline: none; border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0, 243, 255, 0.4); }
        #form > button { background: transparent; border: 2px solid var(--neon-cyan); padding: 10px 20px; border-radius: 8px; color: var(--neon-cyan); cursor: pointer; font-weight: bold; text-shadow: 0 0 5px var(--neon-cyan); font-size: 16px; transition: all 0.3s; }

        /* ====== 設定モーダル群 ====== */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: var(--discord-gray); border-radius: 8px; width: 95%; max-width: 800px; color: white; display: flex; height: 85vh; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        .settings-sidebar { width: 200px; background: var(--discord-gray); padding: 20px 10px; border-right: 1px solid #1e1f22; display: flex; flex-direction: column; z-index: 10; }
        .settings-tab { padding: 10px 15px; border-radius: 4px; cursor: pointer; color: #b5bac1; font-weight: bold; margin-bottom: 5px; transition: background 0.2s; }
        .settings-tab:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .settings-tab.active { background: rgba(255,255,255,0.1); color: #fff; }
        
        .settings-main { flex-grow: 1; background: var(--discord-gray); padding: 40px; overflow-y: auto; position: relative; z-index: 5; }
        .settings-main h3 { font-size: 1.2rem; margin-bottom: 25px; border-bottom: 1px solid #3f4147; padding-bottom: 10px; }
        .settings-section { display: none; }
        .settings-section.active { display: block; }
        
        .close-settings-btn { position: absolute; top: 20px; right: 20px; background: #202225; border: 2px solid #555; color: #ccc; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; z-index: 100; font-size: 16px; }
        .close-settings-btn:hover { border-color: white; color: white; background: #36393f; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: bold; color: #b5bac1; margin-bottom: 8px; text-transform: uppercase; }
        .form-group input[type="text"], .form-group select { width: 100%; padding: 10px; background: var(--discord-dark); color: white; border: none; border-radius: 4px; font-size: 0.95rem; }
        .form-group input[type="text"]:focus, .form-group select:focus { outline: none; box-shadow: 0 0 0 2px var(--neon-cyan); }
        
        .slider-container { display: flex; align-items: center; gap: 15px; }
        input[type="range"] { flex-grow: 1; -webkit-appearance: none; background: #4f545c; height: 6px; border-radius: 3px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: white; cursor: pointer; }
        
        .mic-test-wrap { display: flex; align-items: center; gap: 15px; margin-top: 15px; }
        .mic-test-btn { background: var(--discord-gray); border: 1px solid #555; color: white; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
        .mic-test-btn.testing { border-color: var(--discord-green); color: var(--discord-green); }
        .mic-meter-bg { flex-grow: 1; background: var(--discord-dark); height: 10px; border-radius: 5px; overflow: hidden; }
        .mic-meter-fill { width: 0%; height: 100%; background: var(--discord-green); transition: width 0.1s; }

        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .switch-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #80848e; transition: .3s; border-radius: 20px; }
        .switch-slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .switch-slider { background-color: var(--discord-green); }
        input:checked + .switch-slider:before { transform: translateX(20px); }

        .save-profile-btn { background: var(--discord-green); border: none; color: white; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: background 0.2s; }
        .save-profile-btn:hover { background: #1f8b4c; }

        .friend-modal-content { background: var(--panel-color); padding: 25px; border-radius: 8px; border: 2px solid var(--neon-cyan); width: 90%; max-width: 400px; color: white; max-height: 90vh; overflow-y: auto; }
        .friend-list-ul { list-style: none; padding: 0; margin-bottom: 20px; }
        .friend-list-li { display: flex; justify-content: space-between; align-items: center; background: #0b0c10; padding: 10px; margin-bottom: 5px; border-radius: 4px; border: 1px solid #1f2833; }
        .req-btn { background: transparent; border: 1px solid #555; color: white; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .req-accept { border-color: var(--neon-cyan); color: var(--neon-cyan); margin-right: 5px; }
        .req-reject { border-color: var(--neon-magenta); color: var(--neon-magenta); }

        @media screen and (min-width: 769px) {
            #chat-page { width: 100vw !important; max-width: none !important; height: 100vh !important; top: 0 !important; left: 0 !important; border: none !important; box-shadow: none !important; border-radius: 0 !important; flex-direction: row !important; }
            .sidebar { width: 280px; height: 100%; border-radius: 0; }
            .chat-main { height: 100%; border-radius: 0; }
            .voice-settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        }
        @media screen and (max-width: 768px) {
            #chat-page { width: 100%; height: 100%; top: 0; left: 0; flex-direction: row !important; }
            .menu-toggle-btn { display: block; }
            .sidebar { position: absolute; top: 55px; left: -280px; width: 280px; height: calc(100% - 55px); z-index: 100; transition: left 0.3s ease; border-right: 2px solid var(--neon-cyan); }
            .sidebar.open { left: 0; }
            .chat-main { width: 100%; height: 100%; }
            .modal-content { flex-direction: column; border-radius: 0; width: 100%; height: 100%; max-width: none; }
            .settings-sidebar { width: 100%; border-right: none; border-bottom: 1px solid #1e1f22; flex-direction: row; overflow-x: auto; padding: 10px; }
            .settings-tab { margin-bottom: 0; margin-right: 10px; white-space: nowrap; }
            .settings-main { padding: 20px; }
            .voice-settings-grid { display: flex; flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

    <div id="splash-screen"><div class="neon-logo">同盟 Link</div></div>

    <div id="auth-page" class="auth-container">
        <h2 id="auth-title">ログイン</h2>
        <input id="username" type="text" placeholder="ユーザー名" autofocus />
        <div class="password-wrap">
            <input id="password" type="password" placeholder="パスワード" />
            <button type="button" class="toggle-password" id="eye-btn" onclick="togglePasswordVisibility()">👁</button>
        </div>
        <div id="avatar-selector" style="display: none; text-align: left; margin-bottom: 15px;">
            <label style="color: #666; font-size: 0.8rem; display: block; margin-bottom: 5px;">アイコン選択</label>
            <select id="avatar-select">
                <option value="👾">👾 サイバーコア</option><option value="💀">💀 ネオゴースト</option>
                <option value="🥷">🥷 プレイヤースーツ</option><option value="🦊">🦊 レーザーフォックス</option>
                <option value="🐉">🐉 ネオドラゴン</option><option value="⚡">⚡ ボルト</option><option value="🔥">🔥 フレア</option>
            </select>
        </div>
        <button id="main-btn" class="main-btn" onclick="handleSubmit()">ログイン</button>
        <button id="switch-btn" class="switch-btn" onclick="toggleMode()">新しくアカウントを作る</button>
    </div>

    <div id="chat-page">
        <div id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="profile-info">
                    <div id="my-avatar" class="my-avatar">👾</div>
                    <div id="my-name" class="my-name">ユーザー名</div>
                </div>
                <button class="settings-btn" onclick="openSettings()">⚙️</button>
            </div>
            <div class="sidebar-scroll">
                <div class="sidebar-section-title">チャンネル</div>
                <div id="room-all" class="sidebar-item active" onclick="switchRoom('all')">💬 全体チャット</div>
                
                <div class="sidebar-section-title" style="margin-top:15px;">ボイスチャンネル</div>
                <div class="sidebar-item" id="vc-channel-item" style="margin-bottom:0;">🔊 作業用ボイチャ</div>
                <ul id="vc-user-list" class="vc-member-list"></ul>
                
                <div class="sidebar-item" style="margin-top:15px; border: 1px solid var(--neon-cyan); justify-content:center;" onclick="openFriendModal()">👥 フレンド管理</div>
                <div class="sidebar-section-title" style="margin-top:20px;">フレンドとのDM</div>
                <div id="user-list"></div>
            </div>
            <div class="sidebar-footer">
                <button class="logout-btn" onclick="logout()">ログアウト</button>
            </div>
        </div>

        <div class="chat-main">
            <div class="chat-header">
                <div class="header-left">
                    <button class="menu-toggle-btn" onclick="toggleSidebar()">☰</button>
                    <span id="chat-title-text">💬 全体チャット</span>
                </div>
                <button id="vc-toggle-btn" class="vc-btn" onclick="toggleVoiceChat()">🔊 通話に参加</button>
            </div>
            <ul id="messages"></ul>
            <form id="form" action="">
              <input id="input" autocomplete="off" placeholder="メッセージを送信" /><button>送信</button>
            </form>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <button class="close-settings-btn" onclick="closeSettings()">×</button>
            
            <div class="settings-sidebar">
                <div class="settings-tab active" onclick="switchSettingTab('profile')">👤 マイアカウント</div>
                <div class="settings-tab" onclick="switchSettingTab('voice')">🎙 音声・ビデオ</div>
            </div>
            
            <div class="settings-main">
                <div id="setting-sec-profile" class="settings-section active">
                    <h3>マイアカウント</h3>
                    <div class="form-group">
                        <label>表示名</label>
                        <input id="edit-username" type="text">
                    </div>
                    <div class="form-group">
                        <label>アバターアイコン</label>
                        <select id="edit-avatar">
                            <option value="👾">👾 サイバーコア</option><option value="💀">💀 ネオゴースト</option>
                            <option value="🥷">🥷 プレイヤースーツ</option><option value="🦊">🦊 レーザーフォックス</option>
                            <option value="🐉">🐉 ネオドラゴン</option><option value="⚡">⚡ ボルト</option><option value="🔥">🔥 フレア</option>
                        </select>
                    </div>
                    <div class="form-group" style="display: flex; align-items: center; justify-content: space-between; margin-top: 30px; border-top: 1px solid #3f4147; padding-top: 20px;">
                        <div>
                            <label style="margin:0; color:#fff;">チャット通知音</label>
                            <span style="font-size: 0.75rem; color: #b5bac1;">メッセージ受信時に音を鳴らす</span>
                        </div>
                        <label class="switch"><input type="checkbox" id="sound-toggle" onchange="toggleSound()"><span class="switch-slider"></span></label>
                    </div>
                    
                    <div style="display: flex; gap: 10px; margin-top: 30px; border-top: 1px solid #3f4147; padding-top: 20px;">
                        <button class="save-profile-btn" onclick="saveSettings()">変更を保存</button>
                        <button class="save-profile-btn" style="background: #4f545c;" onclick="closeSettings()">設定を閉じる（戻る）</button>
                    </div>
                </div>

                <div id="setting-sec-voice" class="settings-section">
                    <h3>音声設定</h3>
                    <div class="voice-settings-grid">
                        <div class="form-group">
                            <label>入力デバイス（マイク）</label>
                            <select id="mic-select">
                                <option value="default">Default</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>出力デバイス（スピーカー）</label>
                            <select id="speaker-select">
                                <option value="default">Default</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>入力音量</label>
                            <div class="slider-container">
                                <input type="range" id="mic-volume" min="0" max="100" value="100">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>出力音量</label>
                            <div class="slider-container">
                                <input type="range" id="speaker-volume" min="0" max="100" value="100">
                            </div>
                        </div>
                    </div>
                    <div class="form-group" style="margin-top: 20px; border-top: 1px solid #3f4147; padding-top: 20px;">
                        <label>マイクテスト</label>
                        <span style="font-size: 0.8rem; color: #b5bac1;">話してマイクが反応しているか確認できます</span>
                        <div class="mic-test-wrap">
                            <button id="mic-test-btn" class="mic-test-btn" onclick="toggleMicTest()">確認してみましょう</button>
                            <div class="mic-meter-bg">
                                <div id="mic-meter-fill" class="mic-meter-fill"></div>
                            </div>
                        </div>
                    </div>
                    
                    <div style="margin-top: 30px; border-top: 1px solid #3f4147; padding-top: 20px; display: flex; justify-content: flex-end;">
                        <button class="save-profile-btn" style="background: #4f545c; width: 100%;" onclick="closeSettings()">設定を閉じる（戻る）</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="friend-modal" class="modal" style="z-index: 1001;">
        <div class="friend-modal-content" style="margin:auto;">
            <h3 style="margin-bottom: 20px; text-align: center;">👥 フレンド管理</h3>
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input id="friend-search-input" type="text" placeholder="名前を入力して申請" style="flex-grow:1; padding: 10px; background: #0b0c10; color: white; border: 1px solid #1f2833; border-radius: 4px;">
                <button onclick="sendFriendRequest()" style="background: transparent; border: 1px solid var(--neon-cyan); color: var(--neon-cyan); padding: 0 15px; border-radius: 4px; cursor: pointer;">申請</button>
            </div>
            <div style="font-size: 0.8rem; color: #888; margin-bottom: 5px;">📩 届いている申請</div>
            <ul id="friend-requests-list" class="friend-list-ul"></ul>
            <div style="font-size: 0.8rem; color: #888; margin-bottom: 5px;">🤝 現在のフレンド</div>
            <ul id="current-friends-list" class="friend-list-ul"></ul>
            <div style="display: flex; justify-content: center; margin-top: 20px;"><button style="background: transparent; border: 1px solid #555; color: #ccc; padding: 10px; width: 100%; border-radius: 4px; cursor: pointer;" onclick="closeFriendModal()">閉じる</button></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://download.agora.io/sdk/web/AgoraRTC_N-4.22.0.js"></script>
    <script>
        // 【最重要】ここにあなたがAgoraで取得した「App ID」を必ず貼り付けてください
        const AGORA_APP_ID = "055823a2780f4b5399ff92e7f37bb527"; 

        let isLoginMode = true;
        let myUsername = "";
        let currentRoom = "all"; 
        let allMessages = [];    
        let socket;
        let isSoundEnabled = localStorage.getItem('doumei_sound') !== 'false';

        let agoraClient = null;
        let localAudioTrack = null;
        let isJoinedVoice = false;
        
        let testAudioTrack = null;
        let testInterval = null;

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                if (splash) { splash.style.opacity = '0'; setTimeout(() => splash.remove(), 500); }
            }, 2000);
        });

        function togglePasswordVisibility() {
            const pwd = document.getElementById('password');
            const btn = document.getElementById('eye-btn');
            if (pwd.type === 'password') { pwd.type = 'text'; btn.textContent = '❌'; }
            else { pwd.type = 'password'; btn.textContent = '👁'; }
        }

        window.onload = function() {
            const token = localStorage.getItem('doumei_token');
            const savedUser = localStorage.getItem('doumei_user');
            if (token && savedUser) { myUsername = savedUser; showChatPage(token); }
        };

        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').textContent = isLoginMode ? 'ログイン' : 'アカウント作成';
            document.getElementById('main-btn').textContent = isLoginMode ? 'ログイン' : '登録する';
            document.getElementById('switch-btn').textContent = isLoginMode ? '新しくアカウントを作る' : 'ログイン画面に戻る';
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

        function logout() {
            if (isJoinedVoice) leaveVoiceChat(); 
            localStorage.removeItem('doumei_token');
            localStorage.removeItem('doumei_user');
            localStorage.removeItem('doumei_avatar');
            location.reload();
        }

        async function handleSubmit() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const avatar = document.getElementById('avatar-select').value;
            const url = isLoginMode ? '/login' : '/register';

            if(!username || !password) return alert('入力欄が空欄だよ');

            const bodyData = isLoginMode ? { username, password } : { username, password, avatar };
            const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(bodyData) });
            const data = await res.json();

            if (data.success) {
                if (isLoginMode) {
                    myUsername = username;
                    localStorage.setItem('doumei_token', data.token);
                    localStorage.setItem('doumei_user', username);
                    localStorage.setItem('doumei_avatar', data.avatar);
                    showChatPage(data.token);
                } else {
                    alert('アカウントを作ったよ！ログインしてね。');
                    toggleMode();
                }
            } else { alert(data.message); }
        }

        async function showChatPage(token) {
            document.getElementById('auth-page').style.display = 'none';
            const chatPage = document.getElementById('chat-page');
            chatPage.style.display = 'flex';

            document.getElementById('my-name').textContent = myUsername;
            document.getElementById('my-avatar').textContent = localStorage.getItem('doumei_avatar') || '👾';

            const msgRes = await fetch('/messages');
            allMessages = await msgRes.json();

            await loadFriends();
            switchRoom('all');

            socket = io({ auth: { token: token } });

            document.getElementById('form').onsubmit = (e) => {
                e.preventDefault();
                const input = document.getElementById('input');
                if (input.value.trim()) {
                    socket.emit('chat message', { to: currentRoom, msg: input.value.trim() });
                    input.value = '';
                }
            };

            socket.on('chat message', (data) => {
                allMessages.push(data);
                if (data.from !== myUsername) playNotificationSound();
                if (currentRoom === 'all' && data.to === 'all') renderSingleMessage(data);
                else if (currentRoom !== 'all' && data.to !== 'all') {
                    if ((data.from === myUsername && data.to === currentRoom) || (data.from === currentRoom && data.to === myUsername)) renderSingleMessage(data);
                }
            });

            socket.on('voice users update', (voiceUsers) => {
                const vcListUl = document.getElementById('vc-user-list');
                vcListUl.innerHTML = ''; 
                voiceUsers.forEach(user => {
                    const li = document.createElement('li');
                    li.classList.add('vc-member-item');
                    li.innerHTML = `<span>${user.avatar}</span> <span>${user.username}</span>`;
                    vcListUl.appendChild(li);
                });
            });

            initAgora();
        }

        async function loadFriends() {
            const res = await fetch(`/my-friends?username=${myUsername}`);
            const data = await res.json();
            
            const listDiv = document.getElementById('user-list');
            listDiv.innerHTML = '';
            data.friends.forEach(f => {
                const item = document.createElement('div');
                item.id = `room-${f.username}`;
                item.classList.add('sidebar-item');
                item.innerHTML = `<span>${f.avatar}</span> <span>${f.username}</span>`;
                item.onclick = () => { switchRoom(f.username); document.getElementById('sidebar').classList.remove('open'); };
                listDiv.appendChild(item);
            });

            const friendsUl = document.getElementById('current-friends-list');
            friendsUl.innerHTML = '';
            if(data.friends.length === 0) friendsUl.innerHTML = '<li style="color:#555; font-size:0.9rem;">まだフレンドがいません</li>';
            data.friends.forEach(f => { friendsUl.innerHTML += `<li class="friend-list-li"><span>${f.avatar} ${f.username}</span></li>`; });

            const requestsUl = document.getElementById('friend-requests-list');
            requestsUl.innerHTML = '';
            if(data.requests.length === 0) requestsUl.innerHTML = '<li style="color:#555; font-size:0.9rem;">届いている申請はありません</li>';
            data.requests.forEach(r => {
                requestsUl.innerHTML += `
                    <li class="friend-list-li">
                        <span>${r.avatar} ${r.username}</span>
                        <div>
                            <button class="req-btn req-accept" onclick="handleRequest('${r.username}', 'accept')">承認</button>
                            <button class="req-btn req-reject" onclick="handleRequest('${r.username}', 'reject')">拒否</button>
                        </div>
                    </li>`;
            });
        }

        function openFriendModal() { loadFriends(); document.getElementById('friend-modal').style.display = 'flex'; }
        function closeFriendModal() { document.getElementById('friend-modal').style.display = 'none'; }

        async function sendFriendRequest() {
            const target = document.getElementById('friend-search-input').value.trim();
            if(!target) return;
            const res = await fetch('/friend-request', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ from: myUsername, to: target }) });
            const data = await res.json();
            if(data.success) { alert('申請を送りました！'); document.getElementById('friend-search-input').value = ''; }
            else { alert(data.message); }
        }

        async function handleRequest(targetUsername, action) {
            const res = await fetch('/handle-request', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ myUsername: myUsername, targetUsername: targetUsername, action: action }) });
            const data = await res.json();
            if(data.success) loadFriends();
        }

        function initAgora() {
            agoraClient = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
            agoraClient.on("user-published", async (user, mediaType) => {
                await agoraClient.subscribe(user, mediaType);
                if (mediaType === "audio") { 
                    user.audioTrack.play(); 
                    const vol = document.getElementById('speaker-volume').value;
                    user.audioTrack.setVolume(parseInt(vol));
                }
            });
        }

        async function toggleVoiceChat() {
            if (AGORA_APP_ID === "YOUR_AGORA_APP_ID") return alert("ボイチャを有効にするには、index.htmlのApp IDを設定してね！");

            const btn = document.getElementById('vc-toggle-btn');
            if (!isJoinedVoice) {
                try {
                    btn.textContent = "接続中...";
                    let channelName = "global-voice-channel"; 
                    
                    await agoraClient.join(AGORA_APP_ID, channelName, null, null);
                    
                    const micId = document.getElementById('mic-select').value;
                    let trackConfig = {};
                    if(micId !== 'default' && micId !== '') trackConfig.microphoneId = micId;
                    
                    localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack(trackConfig);
                    
                    const vol = document.getElementById('mic-volume').value;
                    localAudioTrack.setVolume(parseInt(vol));

                    await agoraClient.publish([localAudioTrack]);
                    socket.emit('join voice');

                    isJoinedVoice = true;
                    btn.textContent = "🚫 通話を切断";
                    btn.classList.add('connected');
                } catch (err) {
                    console.error("Agora通話接続エラー:", err);
                    alert("マイク接続に失敗しました。他のアプリ（Discord等）がマイクを独占している可能性があります。");
                    btn.textContent = "🔊 通話に参加";
                    btn.classList.remove('connected');
                }
            } else {
                await leaveVoiceChat();
            }
        }

        async function leaveVoiceChat() {
            const btn = document.getElementById('vc-toggle-btn');
            if (localAudioTrack) { localAudioTrack.stop(); localAudioTrack.close(); localAudioTrack = null; }
            if (agoraClient) { await agoraClient.leave(); }
            socket.emit('leave voice');
            isJoinedVoice = false;
            btn.textContent = "🔊 通話に参加";
            btn.classList.remove('connected');
        }

        async function fetchDevices() {
            try {
                // 修正箇所：ブラウザ標準命令で仮取得し、即座に手放すことでリストを安全に取得
                const tempStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                tempStream.getTracks().forEach(track => track.stop());

                const mics = await AgoraRTC.getMicrophones();
                const speakers = await AgoraRTC.getPlaybackDevices();

                const micSelect = document.getElementById('mic-select');
                micSelect.innerHTML = '';
                mics.forEach(mic => {
                    const opt = document.createElement('option');
                    opt.value = mic.deviceId; opt.text = mic.label || '不明なマイク';
                    micSelect.appendChild(opt);
                });

                const spkSelect = document.getElementById('speaker-select');
                spkSelect.innerHTML = '';
                speakers.forEach(spk => {
                    const opt = document.createElement('option');
                    opt.value = spk.deviceId; opt.text = spk.label || '不明なスピーカー';
                    spkSelect.appendChild(opt);
                });
            } catch (e) {
                console.error("デバイスリスト取得エラー:", e);
            }
        }

        // 修正箇所：権限取得後に確実にトラックを解放するマイクテスト処理
        async function toggleMicTest() {
            const btn = document.getElementById('mic-test-btn');
            const fill = document.getElementById('mic-meter-fill');
            
            if (testInterval) {
                clearInterval(testInterval);
                testInterval = null;
                if(testAudioTrack) { testAudioTrack.stop(); testAudioTrack.close(); testAudioTrack = null; }
                fill.style.width = '0%';
                btn.textContent = "確認してみましょう";
                btn.classList.remove('testing');
            } else {
                try {
                    btn.textContent = "接続中...";
                    
                    // 1. 強制的に権限を要求し、成功したら握ったマイクをすぐに離す
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    stream.getTracks().forEach(track => track.stop());
                    
                    // 2. 許可された状態でリストを再取得（ここでMU900などの名前が取れるようになります）
                    await fetchDevices();

                    const micId = document.getElementById('mic-select').value;
                    let trackConfig = {};
                    if(micId !== 'default' && micId !== '') trackConfig.microphoneId = micId;
                    
                    // 3. Agoraシステムでマイクを起動
                    testAudioTrack = await AgoraRTC.createMicrophoneAudioTrack(trackConfig);
                    
                    btn.textContent = "テスト停止";
                    btn.classList.add('testing');
                    
                    testInterval = setInterval(() => {
                        if(testAudioTrack) {
                            const level = testAudioTrack.getVolumeLevel();
                            fill.style.width = Math.min(level * 250, 100) + '%';
                        }
                    }, 100);
                } catch(e) {
                    console.error("マイクテスト起動エラー:", e);
                    alert("マイクが他のアプリ（Discordなど）で排他使用されているか、物理的に接続されていません。");
                    btn.textContent = "確認してみましょう";
                }
            }
        }

        function switchSettingTab(tabName) {
            document.querySelectorAll('.settings-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.settings-section').forEach(s => s.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById('setting-sec-' + tabName).classList.add('active');

            if(tabName === 'voice') fetchDevices(); 
        }

        function playNotificationSound() {
            if (!isSoundEnabled) return;
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(880, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.1); 
                gainNode.gain.setValueAtTime(0.08, ctx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
                osc.connect(gainNode); gainNode.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.12);
            } catch (e) { console.error(e); }
        }

        function toggleSound() { isSoundEnabled = document.getElementById('sound-toggle').checked; localStorage.setItem('doumei_sound', isSoundEnabled); }
        
        function openSettings() { 
            document.getElementById('edit-username').value = myUsername; 
            document.getElementById('edit-avatar').value = localStorage.getItem('doumei_avatar') || '👾'; 
            document.getElementById('sound-toggle').checked = isSoundEnabled; 
            document.getElementById('settings-modal').style.display = 'flex'; 
        }
        
        function closeSettings() { 
            document.getElementById('settings-modal').style.display = 'none'; 
            if(testInterval) toggleMicTest();
        }

        async function saveSettings() {
            const newUsername = document.getElementById('edit-username').value.trim();
            const newAvatar = document.getElementById('edit-avatar').value;
            if (!newUsername) return alert('名前を空欄にはできないよ');

            const res = await fetch('/update-profile', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ oldUsername: myUsername, newUsername: newUsername, newAvatar: newAvatar }) });
            const data = await res.json();
            if (data.success) { localStorage.setItem('doumei_token', data.token); localStorage.setItem('doumei_user', data.token); localStorage.setItem('doumei_avatar', data.avatar); alert('プロフィールを更新したよ！'); location.reload(); }
            else alert(data.message);
        }

        function switchRoom(roomName) {
            currentRoom = roomName;
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            const targetItem = document.getElementById(`room-${roomName}`);
            if (targetItem) targetItem.classList.add('active');

            document.getElementById('chat-title-text').textContent = roomName === 'all' ? '💬 全体チャット' : `👤 ${roomName} とのDM`;
            const messages = document.getElementById('messages');
            messages.innerHTML = '';

            allMessages.forEach(data => {
                if (roomName === 'all' && data.to === 'all') renderSingleMessage(data);
                else if (roomName !== 'all' && data.to !== 'all') {
                    if ((data.from === myUsername && data.to === roomName) || (data.from === roomName && data.to === myUsername)) renderSingleMessage(data);
                }
            });
            messages.scrollTop = messages.scrollHeight;
        }

        function renderSingleMessage(data) {
            const messages = document.getElementById('messages');
            const wrapper = document.createElement('li');
            wrapper.classList.add('message-wrapper');
            if (data.from === myUsername) wrapper.classList.add('self');
            else { wrapper.classList.add('other'); const nameSpan = document.createElement('span'); nameSpan.classList.add('user-name'); nameSpan.textContent = `${data.avatar} ${data.from}`; wrapper.appendChild(nameSpan); }
            const contentDiv = document.createElement('div'); contentDiv.classList.add('msg-content'); contentDiv.textContent = data.msg; wrapper.appendChild(contentDiv);
            const timeDiv = document.createElement('div'); timeDiv.classList.add('timestamp'); const msgDate = data.time ? new Date(data.time) : new Date(); const hours = String(msgDate.getHours()).padStart(2, '0'); const minutes = String(msgDate.getMinutes()).padStart(2, '0'); timeDiv.textContent = `${hours}:${minutes}`; wrapper.appendChild(timeDiv);
            messages.appendChild(wrapper); messages.scrollTop = messages.scrollHeight;
        }
    </script>
</body>
</html>
