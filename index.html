<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>同盟 Link</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="同盟 Link">
    <meta name="mobile-web-app-capable" content="yes">

    <style>
        /* ==========================================
           1. 全共通のベース設定（ネオンカラー・フォントなど）
           ========================================== */
        :root {
            --bg-color: #0d0e15;
            --panel-color: #161925;
            --neon-cyan: #00f3ff;
            --neon-magenta: #ff0077;
            --text-color: #e0e6ed;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            width: 100%;
            background: var(--bg-color); 
            color: var(--text-color);
            font-family: sans-serif;
            overflow: hidden;
        }

        body { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        /* 起動時のロゴアニメーション画面 */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .neon-logo {
            font-size: 2.5rem;
            font-weight: bold;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-cyan), 0 0 80px var(--neon-cyan);
            animation: flicker 2s infinite alternate;
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% {
                text-shadow: 0 0 4px #fff, 0 0 11px #fff, 0 0 19px var(--neon-cyan), 0 0 40px var(--neon-cyan), 0 0 80px var(--neon-cyan);
            }
            20%, 24%, 55% {        
                text-shadow: none;
            }
        }

        /* ログイン・アカウント作成画面 */
        .auth-container { 
            background: var(--panel-color); 
            padding: 30px 20px; 
            border-radius: 8px; 
            border: 2px solid var(--neon-magenta);
            box-shadow: 0 0 15px rgba(255, 0, 119, 0.3); 
            width: 90%;
            max-width: 340px; 
            text-align: center; 
            z-index: 10;
        }
        .auth-container h2 { margin-bottom: 20px; color: white; text-shadow: 0 0 8px var(--neon-magenta); }
        .auth-container input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px; 
            border-radius: 4px; 
            border: 1px solid #1f2833; 
            background: #0b0c10; 
            color: white; 
            box-sizing: border-box; 
            font-size: 16px;
        }
        .auth-container input:focus { border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0, 243, 255, 0.5); outline: none; }
        
        .auth-container button#main-btn { 
            width: 100%; 
            padding: 12px; 
            background: transparent; 
            border: 2px solid var(--neon-cyan); 
            border-radius: 4px; 
            color: var(--neon-cyan); 
            font-weight: bold; 
            cursor: pointer; 
            margin-bottom: 15px; 
            text-shadow: 0 0 5px var(--neon-cyan);
            box-shadow: 0 0 5px rgba(0, 243, 255, 0.2);
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .auth-container button#main-btn:hover {
            background-color: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 15px var(--neon-cyan);
        }
        .auth-container .switch-btn { background: none; color: var(--neon-cyan); font-size: 14px; cursor: pointer; border: none; }

        .password-wrap { position: relative; width: 100%; }
        .password-wrap input { padding-right: 45px; } 
        .toggle-password { position: absolute; right: 10px; top: 10px; background: none; border: none; color: #b9bbbe; cursor: pointer; font-size: 16px; width: auto !important; padding: 0 !important; margin: 0 !important; }


        /* ==========================================
           2. 共通のチャット部品設定（文字サイズや発光など）
           ========================================== */
        #chat-page { 
            display: none; 
            background-color: var(--bg-color);
        }
        #messages { 
            list-style-type: none; 
            margin: 0; 
            overflow-y: auto; 
            display: flex;
            flex-direction: column;
            gap: 12px;
            -webkit-overflow-scrolling: touch;
        }
        .message-wrapper { display: flex; flex-direction: column; }
        .message-wrapper.self { align-self: flex-end; align-items: flex-end; }
        .message-wrapper.self .msg-content {
            background-color: rgba(255, 0, 119, 0.1);
            border: 1px solid var(--neon-magenta);
            color: #fff;
            box-shadow: 0 0 8px rgba(255, 0, 119, 0.2);
            border-bottom-right-radius: 2px;
        }
        .message-wrapper.other { align-self: flex-start; align-items: flex-start; }
        .message-wrapper.other .msg-content {
            background-color: rgba(0, 243, 255, 0.1);
            border: 1px solid var(--neon-cyan);
            color: #fff;
            box-shadow: 0 0 8px rgba(0, 243, 255, 0.2);
            border-bottom-left-radius: 2px;
        }
        .user-name { font-size: 0.75rem; color: #888; margin-bottom: 2px; padding: 0 4px; font-weight: bold; }
        .msg-content { padding: 10px 14px; border-radius: 14px; font-size: 0.95rem; word-break: break-all; line-height: 1.4; }
        .timestamp { font-size: 0.7rem; color: #555; margin-top: 3px; padding: 0 4px; }

        #form { 
            background: #11131c; 
            display: flex; 
            box-sizing: border-box; 
            border-top: 1px solid #222;
            align-items: center;
        }
        #input { 
            border: none; 
            background: #0b0c10; 
            color: white; 
            border: 1px solid #1f2833; 
            font-size: 16px;
        }
        #input:focus { 
            outline: none; 
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }
        #form > button { 
            background: transparent; 
            border: 2px solid var(--neon-cyan); 
            color: var(--neon-cyan); 
            cursor: pointer; 
            font-weight: bold; 
            text-shadow: 0 0 5px var(--neon-cyan);
            transition: all 0.3s ease;
        }
        #form > button:hover {
            background-color: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 15px var(--neon-cyan);
        }


        /* ==========================================
           3. パソコン用レイアウト (画面の横幅が769px以上の場合)
           ========================================== */
        @media screen and (min-width: 769px) {
            #chat-page { 
                width: 80%;            /* 画面中央に幅を制限して配置 */
                max-width: 900px;
                height: 85vh;          /* 高さを少し抑えてウィンドウ風にする */
                border: 2px solid var(--neon-cyan);
                box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
                border-radius: 12px;
                position: relative;
            }
            #messages { 
                padding: 25px; 
                flex-grow: 1;
            }
            .message-wrapper {
                max-width: 70%;        /* PCは大画面なので吹き出しの最大幅を70%に制限 */
            }
            #form { 
                padding: 15px; 
                height: 4.5rem;
                border-bottom-left-radius: 10px;
                border-bottom-right-radius: 10px;
                gap: 12px;
            }
            #input { 
                padding: 12px 18px; 
                border-radius: 8px; 
            }
            #form > button { 
                padding: 10px 25px; 
                border-radius: 8px; 
                font-size: 16px;
                height: 100%;
            }
        }


        /* ==========================================
           4. スマホ用レイアウト (画面の横幅が768px以下の場合)
           ========================================== */
        @media screen and (max-width: 768px) {
            #chat-page { 
                width: 100%;           /* 画面の横幅いっぱいに広げる */
                height: 100%;          /* 画面の縦幅いっぱいに広げる */
                position: absolute;    /* キーボード表示時のズレを防ぐため絶対配置 */
                top: 0;
                left: 0;
                border: none;
                box-shadow: none;
                border-radius: 0;
            }
            #messages { 
                padding: 15px; 
                flex-grow: 1;
            }
            .message-wrapper {
                max-width: 85%;        /* スマホは画面幅が狭いため、吹き出し幅を85%まで広げて見やすく */
            }
            #form { 
                padding: 10px; 
                height: 4rem;
                gap: 8px;
            }
            #input { 
                padding: 10px; 
                border-radius: 8px; 
            }
            #form > button { 
                padding: 10px 18px; 
                border-radius: 8px; 
                font-size: 15px;
                height: 100%;
            }
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="neon-logo">同盟 Link</div>
    </div>

    <div id="auth-page" class="auth-container">
        <h2 id="auth-title">ログイン</h2>
        <input id="username" type="text" placeholder="ユーザー名" autofocus />
        
        <div class="password-wrap">
            <input id="password" type="password" placeholder="パスワード" />
            <button type="button" class="toggle-password" id="eye-btn" onclick="togglePasswordVisibility()">👁</button>
        </div>

        <button id="main-btn" onclick="handleSubmit()">ログイン</button>
        <button id="switch-btn" class="switch-btn" onclick="toggleMode()">新しくアカウントを作る</button>
    </div>

    <div id="chat-page">
        <ul id="messages"></ul>
        <form id="form" action="">
          <input id="input" autocomplete="off" placeholder="メッセージを送信" /><button>送信</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let isLoginMode = true;
        let myUsername = "";

        // 起動時ロゴ演出
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                if (splash) {
                    splash.style.opacity = '0';
                    setTimeout(() => splash.remove(), 500);
                }
            }, 2000);
        });

        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const eyeBtn = document.getElementById('eye-btn');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeBtn.textContent = '❌';
            } else {
                passwordInput.type = 'password';
                eyeBtn.textContent = '👁';
            }
        }

        window.onload = function() {
            const token = localStorage.getItem('doumei_token');
            const savedUser = localStorage.getItem('doumei_user');
            if (token && savedUser) {
                myUsername = savedUser;
                showChatPage(token);
            }
        };

        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').textContent = isLoginMode ? 'ログイン' : 'アカウント作成';
            document.getElementById('main-btn').textContent = isLoginMode ? 'ログイン' : '登録する';
            document.getElementById('switch-btn').textContent = isLoginMode ? '新しくアカウントを作る' : 'ログイン画面に戻る';
        }

        async function handleSubmit() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const url = isLoginMode ? '/login' : '/register';

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await response.json();

            if (data.success) {
                if (isLoginMode) {
                    myUsername = username;
                    localStorage.setItem('doumei_token', data.token);
                    localStorage.setItem('doumei_user', username);
                    showChatPage(data.token);
                } else {
                    alert('アカウントを作ったよ！ログインしてね。');
                    toggleMode();
                }
            } else {
                alert(data.message);
            }
        }

        function showChatPage(token) {
            document.getElementById('auth-page').style.display = 'none';
            
            const chatPage = document.getElementById('chat-page');
            chatPage.style.display = 'flex';

            const socket = io({ auth: { token: token } });

            const form = document.getElementById('form');
            const input = document.getElementById('input');
            const messages = document.getElementById('messages');

            form.onsubmit = (e) => {
                e.preventDefault();
                if (input.value) {
                    socket.emit('chat message', input.value);
                    input.value = '';
                }
            };

            socket.on('chat message', (data) => {
                const wrapper = document.createElement('li');
                wrapper.classList.add('message-wrapper');
                
                if (data.username === myUsername) {
                    wrapper.classList.add('self');
                } else {
                    wrapper.classList.add('other');
                    const nameSpan = document.createElement('span');
                    nameSpan.classList.add('user-name');
                    nameSpan.textContent = data.username;
                    wrapper.appendChild(nameSpan);
                }

                const contentDiv = document.createElement('div');
                contentDiv.classList.add('msg-content');
                contentDiv.textContent = data.msg;
                wrapper.appendChild(contentDiv);

                const timeDiv = document.createElement('div');
                timeDiv.classList.add('timestamp');
                const now = new Date();
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                timeDiv.textContent = `${hours}:${minutes}`;
                wrapper.appendChild(timeDiv);

                messages.appendChild(wrapper);
                messages.scrollTop = messages.scrollHeight;
            });
        }
    </script>
</body>
</html>
