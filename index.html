<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>同盟 Link</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="同盟 Link">
    <meta name="mobile-web-app-capable" content="yes">

    <style>
        /* ゲーミング・ネオンデザインのベース設定 */
        :root {
            --bg-color: #0d0e15;
            --panel-color: #161925;
            --neon-cyan: #00f3ff;
            --neon-magenta: #ff0077;
            --text-color: #e0e6ed;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            margin: 0; 
            font-family: sans-serif; 
            background: var(--bg-color); 
            color: var(--text-color); 
            display: flex; 
            height: 100vh; 
            align-items: center; 
            justify-content: center; 
        }
        
        /* 起動時のロゴアニメーション画面 */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .neon-logo {
            font-size: 3rem;
            font-weight: bold;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-cyan), 0 0 80px var(--neon-cyan);
            animation: flicker 2s infinite alternate;
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% {
                text-shadow: 0 0 4px #fff, 0 0 11px #fff, 0 0 19px var(--neon-cyan), 0 0 40px var(--neon-cyan), 0 0 80px var(--neon-cyan);
            }
            20%, 24%, 55% {        
                text-shadow: none;
            }
        }

        /* ログイン・アカウント作成画面のネオン見た目 */
        .auth-container { 
            background: var(--panel-color); 
            padding: 40px; 
            border-radius: 8px; 
            border: 2px solid var(--neon-magenta);
            box-shadow: 0 0 15px rgba(255, 0, 119, 0.3); 
            width: 320px; 
            text-align: center; 
        }
        .auth-container h2 { margin-bottom: 20px; color: white; text-shadow: 0 0 8px var(--neon-magenta); }
        .auth-container input { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 4px; border: 1px solid #1f2833; background: #0b0c10; color: white; box-sizing: border-box; }
        .auth-container input:focus { border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0, 243, 255, 0.5); outline: none; }
        
        .auth-container button#main-btn { 
            width: 100%; 
            padding: 10px; 
            background: transparent; 
            border: 2px solid var(--neon-cyan); 
            border-radius: 4px; 
            color: var(--neon-cyan); 
            font-weight: bold; 
            cursor: pointer; 
            margin-bottom: 10px; 
            text-shadow: 0 0 5px var(--neon-cyan);
            box-shadow: 0 0 5px rgba(0, 243, 255, 0.2);
            transition: all 0.3s ease;
        }
        .auth-container button#main-btn:hover {
            background-color: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 15px var(--neon-cyan);
        }
        .auth-container .switch-btn { background: none; color: var(--neon-cyan); font-size: 14px; cursor: pointer; border: none; }

        /* パスワード入力欄の設定 */
        .password-wrap { position: relative; width: 100%; }
        .password-wrap input { padding-right: 45px; } 
        .toggle-password { position: absolute; right: 10px; top: 8px; background: none; border: none; color: #b9bbbe; cursor: pointer; font-size: 16px; width: auto !important; padding: 5px !important; margin: 0 !important; }

        /* チャット画面の見た目 */
        #chat-page { 
            display: none; 
            width: 100%; 
            height: 100%; 
            flex-direction: column; 
            justify-content: flex-end; 
            background-color: var(--bg-color);
        }
        #form { 
            background: #0d0e15; 
            padding: 0.5rem; 
            display: flex; 
            height: 4rem; 
            box-sizing: border-box; 
            width: 100%; 
            border-top: 1px solid #222;
            gap: 10px;
        }
        #input { 
            border: none; 
            padding: 0 1rem; 
            flex-grow: 1; 
            border-radius: 8px; 
            background: #0b0c10; 
            color: white; 
            border: 1px solid #1f2833; 
        }
        #input:focus { 
            outline: none; 
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }
        #form > button { 
            background: transparent; 
            border: 2px solid var(--neon-cyan); 
            padding: 0 1.5rem; 
            border-radius: 4px; 
            color: var(--neon-cyan); 
            cursor: pointer; 
            font-weight: bold; 
            text-shadow: 0 0 5px var(--neon-cyan);
            transition: all 0.3s ease;
        }
        #form > button:hover {
            background-color: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        /* 吹き出し構造の最適化 */
        #messages { 
            list-style-type: none; 
            margin: 0; 
            padding: 20px; 
            overflow-y: auto; 
            flex-grow: 1; 
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        /* 吹き出しのベースラッピング */
        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 70%;
        }
        
        /* 自分の吹き出し配置とネオン装飾（マゼンタ） */
        .message-wrapper.self {
            align-self: flex-end;
            align-items: flex-end;
        }
        .message-wrapper.self .msg-content {
            background-color: rgba(255, 0, 119, 0.1);
            border: 1px solid var(--neon-magenta);
            color: #fff;
            box-shadow: 0 0 8px rgba(255, 0, 119, 0.2);
            border-bottom-right-radius: 2px;
        }

        /* 他人の吹き出し配置とネオン装飾（シアン） */
        .message-wrapper.other {
            align-self: flex-start;
            align-items: flex-start;
        }
        .message-wrapper.other .msg-content {
            background-color: rgba(0, 243, 255, 0.1);
            border: 1px solid var(--neon-cyan);
            color: #fff;
            box-shadow: 0 0 8px rgba(0, 243, 255, 0.2);
            border-bottom-left-radius: 2px;
        }

        /* ユーザー名とメッセージテキスト、時間の配置 */
        .user-name { font-size: 0.8rem; color: #888; margin-bottom: 3px; padding: 0 5px; font-weight: bold; }
        .msg-content { padding: 10px 15px; border-radius: 14px; font-size: 0.95rem; word-break: break-all; }
        .timestamp { font-size: 0.75rem; color: #555; margin-top: 4px; padding: 0 5px; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="neon-logo">同盟 Link</div>
    </div>

    <div id="auth-page" class="auth-container">
        <h2 id="auth-title">ログイン</h2>
        <input id="username" type="text" placeholder="ユーザー名" />
        
        <div class="password-wrap">
            <input id="password" type="password" placeholder="パスワード" />
            <button type="button" class="toggle-password" id="eye-btn" onclick="togglePasswordVisibility()">👁</button>
        </div>

        <button id="main-btn" onclick="handleSubmit()">ログイン</button>
        <button id="switch-btn" class="switch-btn" onclick="toggleMode()">新しくアカウントを作る</button>
    </div>

    <div id="chat-page">
        <ul id="messages"></ul>
        <form id="form" action="">
          <input id="input" autocomplete="off" placeholder="メッセージを送信" /><button>送信</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let isLoginMode = true;
        let myUsername = ""; // 自分の名前を保持する変数

        // 起動時ロゴを2秒表示したあとフェードアウトして消去する
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                if (splash) {
                    splash.style.opacity = '0';
                    setTimeout(() => splash.remove(), 500);
                }
            }, 2000);
        });

        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const eyeBtn = document.getElementById('eye-btn');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeBtn.textContent = '❌';
            } else {
                passwordInput.type = 'password';
                eyeBtn.textContent = '👁';
            }
        }

        window.onload = function() {
            const token = localStorage.getItem('doumei_token');
            const savedUser = localStorage.getItem('doumei_user');
            if (token && savedUser) {
                myUsername = savedUser; // 保存されたユーザー名を復元
                showChatPage(token);
            }
        };

        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').textContent = isLoginMode ? 'ログイン' : 'アカウント作成';
            document.getElementById('main-btn').textContent = isLoginMode ? 'ログイン' : '登録する';
            document.getElementById('switch-btn').textContent = isLoginMode ? '新しくアカウントを作る' : 'ログイン画面に戻る';
        }

        async function handleSubmit() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const url = isLoginMode ? '/login' : '/register';

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await response.json();

            if (data.success) {
                if (isLoginMode) {
                    myUsername = username; // 自分の名前をセット
                    localStorage.setItem('doumei_token', data.token);
                    localStorage.setItem('doumei_user', username); // ユーザー名も保存
                    showChatPage(data.token);
                } else {
                    alert('アカウントを作ったよ！ログインしてね。');
                    toggleMode();
                }
            } else {
                alert(data.message);
            }
        }

        function showChatPage(token) {
            document.getElementById('auth-page').style.display = 'none';
            document.getElementById('chat-page').style.display = 'flex';
            document.body.style.alignItems = 'stretch';

            const socket = io({ auth: { token: token } });

            const form = document.getElementById('form');
            const input = document.getElementById('input');
            const messages = document.getElementById('messages');

            form.onsubmit = (e) => {
                e.preventDefault();
                if (input.value) {
                    socket.emit('chat message', input.value);
                    input.value = '';
                }
            };

            socket.on('chat message', (data) => {
                // メッセージを包むラッパー要素の作成
                const wrapper = document.createElement('li');
                wrapper.classList.add('message-wrapper');
                
                // 自分か他人かでクラスを分岐
                if (data.username === myUsername) {
                    wrapper.classList.add('self');
                } else {
                    wrapper.classList.add('other');
                    // 他人の場合のみ上にユーザー名を表示
                    const nameSpan = document.createElement('span');
                    nameSpan.classList.add('user-name');
                    nameSpan.textContent = data.username;
                    wrapper.appendChild(nameSpan);
                }

                // 吹き出し（メッセージ本文）の作成
                const contentDiv = document.createElement('div');
                contentDiv.classList.add('msg-content');
                contentDiv.textContent = data.msg;
                wrapper.appendChild(contentDiv);

                // 送信時間の作成（メッセージ受信時の現在時刻を生成）
                const timeDiv = document.createElement('div');
                timeDiv.classList.add('timestamp');
                const now = new Date();
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                timeDiv.textContent = `${hours}:${minutes}`;
                wrapper.appendChild(timeDiv);

                messages.appendChild(wrapper);
                messages.scrollTop = messages.scrollHeight;
            });
        }
    </script>
</body>
</html>
