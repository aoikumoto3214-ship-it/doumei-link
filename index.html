<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>同盟 Link</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="同盟 Link">
    <meta name="mobile-web-app-capable" content="yes">

    <style>
        /* Discord風のカッコいいダークモード設定 */
        body { margin: 0; font-family: sans-serif; background: #36393f; color: #dcddde; display: flex; height: 100vh; align-items: center; justify-content: center; }
        
        /* ログイン画面の見た目 */
        .auth-container { background: #2f3136; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); width: 320px; text-align: center; }
        .auth-container h2 { margin-bottom: 20px; color: white; }
        .auth-container input { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 4px; border: 1px solid #202225; background: #202225; color: white; box-sizing: border-box; }
        .auth-container button { width: 100%; padding: 10px; background: #5865f2; border: none; border-radius: 4px; color: white; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .auth-container .switch-btn { background: none; color: #00aff4; font-size: 14px; cursor: pointer; border: none; }

        /* パスワード入力欄とボタンを横並びにする設定 */
        .password-wrap { position: relative; width: 100%; }
        .password-wrap input { padding-right: 45px; } 
        .toggle-password { position: absolute; right: 10px; top: 8px; background: none; border: none; color: #b9bbbe; cursor: pointer; font-size: 16px; width: auto !important; padding: 5px !important; margin: 0 !important; }

        /* チャット画面の見た目 */
        #chat-page { display: none; width: 100%; height: 100%; flex-direction: column; justify-content: flex-end; }
        #form { background: #40444b; padding: 0.25rem; display: flex; height: 3rem; box-sizing: border-box; width: 100%; }
        #input { border: none; padding: 0 1rem; flex-grow: 1; border-radius: 8px; margin: 0.25rem; background: #40444b; color: white; border: 1px solid #202225; }
        #input:focus { outline: none; }
        #form > button { background: #5865f2; border: none; padding: 0 1rem; margin: 0.25rem; border-radius: 4px; color: white; cursor: pointer; font-weight: bold; }
        #messages { list-style-type: none; margin: 0; padding: 10px; overflow-y: auto; flex-grow: 1; }
        #messages > li { padding: 0.5rem 1rem; background: #32353b; margin-bottom: 5px; border-radius: 5px; }
        .user-name { font-weight: bold; color: #fff; margin-right: 10px; }
    </style>
</head>
<body>

    <div id="auth-page" class="auth-container">
        <h2 id="auth-title">ログイン</h2>
        <input id="username" type="text" placeholder="ユーザー名" />
        
        <div class="password-wrap">
            <input id="password" type="password" placeholder="パスワード" />
            <button type="button" class="toggle-password" id="eye-btn" onclick="togglePasswordVisibility()">👁</button>
        </div>

        <button id="main-btn" onclick="handleSubmit()">ログイン</button>
        <button id="switch-btn" class="switch-btn" onclick="toggleMode()">新しくアカウントを作る</button>
    </div>

    <div id="chat-page">
        <ul id="messages"></ul>
        <form id="form" action="">
          <input id="input" autocomplete="off" placeholder="メッセージを送信" /><button>送信</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let isLoginMode = true;

        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const eyeBtn = document.getElementById('eye-btn');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeBtn.textContent = '❌';
            } else {
                passwordInput.type = 'password';
                eyeBtn.textContent = '👁';
            }
        }

        window.onload = function() {
            const token = localStorage.getItem('doumei_token');
            if (token) {
                showChatPage(token);
            }
        };

        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').textContent = isLoginMode ? 'ログイン' : 'アカウント作成';
            document.getElementById('main-btn').textContent = isLoginMode ? 'ログイン' : '登録する';
            document.getElementById('switch-btn').textContent = isLoginMode ? '新しくアカウントを作る' : 'ログイン画面に戻る';
        }

        async function handleSubmit() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const url = isLoginMode ? '/login' : '/register';

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await response.json();

            if (data.success) {
                if (isLoginMode) {
                    localStorage.setItem('doumei_token', data.token);
                    showChatPage(data.token);
                } else {
                    alert('アカウントを作ったよ！ログインしてね。');
                    toggleMode();
                }
            } else {
                alert(data.message);
            }
        }

        function showChatPage(token) {
            document.getElementById('auth-page').style.display = 'none';
            document.getElementById('chat-page').style.display = 'flex';
            document.body.style.alignItems = 'stretch';

            const socket = io({ auth: { token: token } });

            const form = document.getElementById('form');
            const input = document.getElementById('input');
            const messages = document.getElementById('messages');

            form.onsubmit = (e) => {
                e.preventDefault();
                if (input.value) {
                    socket.emit('chat message', input.value);
                    input.value = '';
                }
            };

            socket.on('chat message', (data) => {
                const item = document.createElement('li');
                item.innerHTML = `<span class="user-name">${data.username}:</span> ${data.msg}`;
                messages.appendChild(item);
                messages.scrollTop = messages.scrollHeight;
            });
        }
    </script>
</body>
</html>
